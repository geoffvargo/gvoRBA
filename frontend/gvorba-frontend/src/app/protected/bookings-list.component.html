<div class="min-h-[calc(100vh-74px)] bg-base-200 p-4 flex justify-center content-center w-auto items-center">
	<div class="card shadow-lg bg-base-100 flex flex-col py-4 overflow-x-auto w-fit justify-center">
		<h1 class="text-center text-2xl font-bold">
			All Bookings
		</h1>
		<div class="card-body flex jsutify-center items-center">
			<table class="mat-elevation-x8 mx-16 w-max"
			       mat-table
			       matSort
			       [dataSource]="dataSource">
				
				<ng-container matColumnDef="id">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="id">
						Booking Number
					</th>
					<td mat-cell
					    *matCellDef="let booking">
						{{ booking.id }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="roomId">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="roomId">
						Room Id
					</th>
					<td mat-cell
					    *matCellDef="let booking">
						{{ booking.room.id }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="userId">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="userId">
						User Id
					</th>
					<td mat-cell
					    *matCellDef="let booking">
						{{ booking.userId.id }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="startsAt">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="startsAt">
						Starts At
					</th>
					<td mat-cell
					    *matCellDef="let booking">
						{{ booking.startsAt }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="endsAt">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="endsAt">
						Ends At
					</th>
					<td mat-cell
					    *matCellDef="let booking">
						{{ booking.endsAt }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="cancelledAt">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="cancelledAt">
						Cancelled At
					</th>
					<td mat-cell
					    *matCellDef="let booking">
						{{ booking.cancelledAt }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="purpose">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="purpose">
						Purpose
					</th>
					<td mat-cell
					    *matCellDef="let booking">
						{{ booking.purpose }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="status">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="status">
						Status
					</th>
					<td mat-cell
					    *matCellDef="let booking">
						{{ booking.status }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="action">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="action">
						Action
					</th>
					<td mat-cell
					    *matCellDef="let booking">
						<button class="action-btn"
						        (click)="onView(booking.id, booking)">
							View
						</button>
					</td>
				</ng-container>
				
				<tr mat-header-row
				    *matHeaderRowDef="displayedColumns"></tr>
				<tr mat-row
				    *matRowDef="let row; columns: displayedColumns;"></tr>
			
			</table>
			
			<mat-paginator [pageSizeOptions]="[10,25,50]"
			               [selectConfig]="{ panelClass: 'paginator'}"
			               class="m-4 rounded-box!"
			               showFirstLastButtons
			               aria-label="List of All Bookings"></mat-paginator>
			<!-- 			               style="border-radius: 1rem; overflow: hidden" -->
		
		</div>
	</div>
</div>
