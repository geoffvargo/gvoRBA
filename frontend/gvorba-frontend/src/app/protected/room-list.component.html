<div class="bg-base-200 p-4 flex justify-center content-center w-auto items-center">
	<div class="card bg-base-100 flex flex-col py-4 overflow-x-auto w-fit justify-center">
		<h1 class="text-center text-2xl font-bold">
			All Rooms
		</h1>
		<div class="card-body justify-center flex items-center">
			<table class="mat-elevation-x8 mx-16 w-max"
			       mat-table
			       matSort
			       [dataSource]="dataSource">
				<ng-container matColumnDef="id">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="id">
						Room Id
					</th>
					<td mat-cell
					    *matCellDef="let room">
						{{ room.id }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="name">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="name">
						Room Name
					</th>
					<td mat-cell
					    *matCellDef="let room">
						{{ room.name }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="location">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="location">
						Location
					</th>
					<td mat-cell
					    *matCellDef="let room">
						{{ room.location }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="capacity">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="capacity">
						Capacity
					</th>
					<td mat-cell
					    *matCellDef="let room">
						{{ room.capacity }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="amenities">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="amenities">
						Amenities
					</th>
					<td mat-cell
					    *matCellDef="let room">
						{{ room.amenities }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="isActive">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="isActive">
						Active
					</th>
					<td mat-cell
					    *matCellDef="let room">
						{{ room.isActive }}
					</td>
				</ng-container>
				
				<ng-container matColumnDef="createdOn">
					<th mat-header-cell
					    *matHeaderCellDef
					    mat-sort-header="createdOn">
						Created
					</th>
					<td mat-cell
					    *matCellDef="let room">
						{{ room.createdOn }}
					</td>
				</ng-container>
				
				<tr mat-header-row
				    *matHeaderRowDef="displayedColumns"></tr>
				<tr mat-row
				    *matRowDef="let row; columns: displayedColumns;"></tr>
			</table>
		</div>
	</div>
</div>
