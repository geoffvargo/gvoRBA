app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring:
  application:
    name: gvoRBA Backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booking}
    username: ${DB_USERNAME:booking}
    password: ${DB_PASSWORD:booking}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: ${PORT:8080}
